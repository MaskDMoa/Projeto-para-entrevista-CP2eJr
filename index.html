<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Projeto CP2</title>
</head>
<body>

    
    <div class="topo">
    <button class="btn-nova" onclick="abrirModal()">Nova Transação</button>
    </div>

    <dialog id="Modal">

    <button class="btn-fechar" onclick="fecharModal()">X</button>

    <h2>Nova Transação</h2>

    <div class="grid-container-modal">
        <div class="modal-text">
            <input type="text" placeholder="Descrição">
        </div>
        <div class="modal-text">
            <input type="number" placeholder="Preço">
        </div>
        <div class="modal-text">
            <input type="text" placeholder="Categoria">
        </div>
    </div>

    <div class="grid-container-button">
        <button class="grid-button" id="btn-entrada" onclick="btnentry()">Entrada</button>
        <button class="grid-button" id="btn-saida" onclick="btnout()">Saída</button>
    </div>

    <button class="btn-cadastrar" onclick="btncadastrar()">Cadastrar</button>
</dialog>

    <div class="grid-container">

        <div class="grid-item">
            <p class="string">Entradas</p>
            <p class="number">R$ 0,00</p>
        </div>
        <div class="grid-item">
            <p class="string">Saídas</p>
            <p class="number">R$ 0,00</p>
        </div>
        <div class="grid-item3">
            <p class="string">Total</p>
            <p class="number">R$ 0,00</p>
        </div>

    </div>


    <script src="script.js"></script>
</body>
</html>
